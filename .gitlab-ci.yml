stages:
  - verify
  - build

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375

default:
  tags:
    - docker-builder

check_go:
  stage: verify
  image: golang:1.23-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
  variables:
    GOCACHE: "$CI_PROJECT_DIR/.cache/go-build"
    GOMODCACHE: "$CI_PROJECT_DIR/.cache/go-mod"
  cache:
    key: "go-$CI_COMMIT_REF_SLUG"
    paths:
      - .cache/go-build
      - .cache/go-mod
  script:
    - GOFMT_OUTPUT=$(find . -type f -name '*.go' -not -path './vendor/*' -print0 | xargs -0 gofmt -l)
    - |
      if [ -n "$GOFMT_OUTPUT" ]; then
        echo "Go files need formatting (run gofmt):"
        echo "$GOFMT_OUTPUT"
        exit 1
      fi
    - go mod download
    - go vet ./...
    - go test ./...

verify_image:
  stage: verify
  image: docker:29
  services:
    - docker:29-dind
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
  script:
    - docker build --pull -f Dockerfile -t "reveille-ci:$CI_COMMIT_SHORT_SHA" .

build_image:
  stage: build
  image: docker:29
  services:
    - docker:29-dind
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - RELEASE_TAG=${CI_COMMIT_TAG#v}
    - docker build --pull -f Dockerfile -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG" -t "$CI_REGISTRY_IMAGE:$RELEASE_TAG" -t "$CI_REGISTRY_IMAGE:latest" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
    - docker push "$CI_REGISTRY_IMAGE:$RELEASE_TAG"
    - docker push "$CI_REGISTRY_IMAGE:latest"
