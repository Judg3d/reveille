services:
  reveille:
    build:
      context: .
      dockerfile: Dockerfile
    image: reveille:dev
    container_name: reveille
    restart: unless-stopped
    environment:
      DOCKHAND_API_TOKEN: ${DOCKHAND_API_TOKEN:-}
    command:
      - -config
      - /etc/reveille/reveille.yml
      - -hosts
      - /etc/reveille/hosts
    ports:
      - "${REVEILLE_PORT:-8080}:8080"
    volumes:
      - ./reveille.yml:/etc/reveille/reveille.yml:ro
      - ./targets:/etc/reveille/hosts:ro # DO NOT CHANGE INTERNAL MOUNT

