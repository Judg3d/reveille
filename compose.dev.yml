services:
  reveille:
    build:
      context: .
      dockerfile: Dockerfile
    image: reveille:dev
    container_name: reveille
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    # Use expose when Reveille shares a Docker network with Traefik.
    expose:
      - "8080"
    volumes:
      - ./reveille.yml:/etc/reveille/reveille.yml:ro
      - ./targets:/etc/reveille/hosts:ro # DO NOT CHANGE INTERNAL MOUNT
