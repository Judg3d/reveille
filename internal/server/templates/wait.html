<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="5">
  <title>Starting {{.Host}}</title>
  <link rel="stylesheet" href="{{.PublicPath}}/static/wait.css">
</head>
<body>
  <main class="shell">
    <section class="panel">
      <div>
        <p class="eyebrow">Reveille</p>
        <h1>{{.Host}} is starting</h1>
        <p class="copy">The service is being started. This page will continue automatically when the health check passes.</p>
      </div>
      <form id="lease-form" class="lease" method="post" action="{{.PublicPath}}/api/lease?host={{.Host}}">
        <input type="hidden" name="returnTo" value="{{.ReturnTo}}">
        <label for="lease">Lease</label>
        <div class="lease-row">
          <select id="lease" name="lease">
            {{range .LeaseOptions}}
            <option value="{{.Label}}" {{if eq .Label $.LeaseDefault}}selected{{end}}>{{.Label}}</option>
            {{end}}
          </select>
          <button type="submit">Apply</button>
        </div>
      </form>
      <div class="status" id="status">Checking every 5 seconds...</div>
      <form method="post" action="{{.PublicPath}}/api/stop?host={{.Host}}">
        <button class="secondary" type="submit">Stop now</button>
      </form>
    </section>
  </main>
  <script>
    window.reveille = {
      host: {{printf "%q" .Host}},
      returnTo: {{printf "%q" .ReturnTo}},
      publicPath: {{printf "%q" .PublicPath}},
      pollMillis: {{.PollMillis}}
    };
  </script>
  <script src="{{.PublicPath}}/static/wait.js"></script>
</body>
</html>
