server:
  listen: ":8080"
  publicPath: "/_reveille"

dockhand:
  baseUrl: "http://dockhand:3000"
  apiToken: "${DOCKHAND_API_TOKEN}"
  environmentId: 1
  timeout: "30s"

defaults:
  lease: "2h"
  leaseOptions:
    - "30m"
    - "1h"
    - "2h"
    - "4h"
    - "never"
  startTimeout: "3m"
  stopGrace: "30s"
  pollInterval: "5s"
