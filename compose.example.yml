services:
  reveille:
    image: ghcr.io/your-org/reveille:${REVEILLE_TAG:-latest}
    container_name: reveille
    restart: unless-stopped
    environment:
      DOCKHAND_API_TOKEN: ${DOCKHAND_API_TOKEN:-}
    command:
      - -config
      - /etc/reveille/reveille.yml
      - -hosts
      - /etc/reveille/hosts
    # Use expose when Reveille shares a Docker network with Traefik.
    expose:
      - "8080"
    # If Reveille is not used through Traefik, publish it only on a specific
    # host interface. Defaults in .env.example bind to localhost.
    #ports:
    #  - "${REVEILLE_BIND_HOST:-127.0.0.1}:${REVEILLE_PORT:-8080}:8080"
    volumes:
      - ./reveille.yml:/etc/reveille/reveille.yml:ro
      - ./target:/etc/reveille/hosts:ro # DO NOT CHANGE INTERNAL MOUNT
